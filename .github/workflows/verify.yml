name: Verify ZK-LoRa Codebase

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-python:
    name: Run Cryptographic & App Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ecdsa

      - name: Run ZK-SNARK Prover & Verifier Validation
        run: |
          python run_proof.py

      - name: Run Voice App Non-Interactive Test Suite
        run: |
          python zymatica_voice_app.py --test
